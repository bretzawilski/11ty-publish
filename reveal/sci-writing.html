		var forgetPop = true;
		function onPopState(event) {
			if(forgetPop){
				forgetPop = false;
			} else {
				parent.postMessage(event.target.location.href, "app://obsidian.md");
			}
        }
		window.onpopstate = onPopState;
		window.onmessage = event => {
			if(event.data == "reload"){
				window.document.location.reload();
			}
			forgetPop = true;
		}

		function fitElements(){
			const itemsToFit = document.getElementsByClassName('fitText');
			for (const item in itemsToFit) {
				if (Object.hasOwnProperty.call(itemsToFit, item)) {
					var element = itemsToFit[item];
					fitElement(element,1, 1000);
					element.classList.remove('fitText');
				}
			}
		}

		function fitElement(element, start, end){

			let size = (end + start) / 2;
			element.style.fontSize = `${size}px`;

			if(Math.abs(start - end) < 1){
				while(element.scrollHeight > element.offsetHeight){
					size--;
					element.style.fontSize = `${size}px`;
				}
				return;
			}

			if(element.scrollHeight > element.offsetHeight){
				fitElement(element, start, size);
			} else {
				fitElement(element, size, end);
			}		
		}


		document.onreadystatechange = () => {
			fitElements();
			if (document.readyState === 'complete') {
				if (window.location.href.indexOf("?export") != -1){
					parent.postMessage(event.target.location.href, "app://obsidian.md");
				}
				if (window.location.href.indexOf("print-pdf") != -1){
					let stateCheck = setInterval(() => {
						clearInterval(stateCheck);
						window.print();
					}, 250);
				}
			}
	};

## Learning Goals of the Unit
- Examine the genres of scientific communication<sup>1, 2</sup>
- Develop a terminology for exploring multimodal texts<sup>3</sup>
- Explore the affordances and limitations of new media platforms<sup>4, 5</sup>
- Compose a podcast with an accompanying website based on current scientific research
</script></section><section data-markdown><script type="text/template">
### Genre Knowledge
- Genres reflect the problems they address<sup>6, 7</sup>
- Texts are forms of taking action, not passive conduits for information<sup>8</sup>
- Multiple genres participate in the "lifecycle" of scientific knowledge<sup>9</sup>
- Examples include:
	- Journal Articles
	- Conference Presentations
	- Research Posters
	- Surveys for Non-field Specialists
	- Grant Proposals
	- Science Popularization articles
</script></section><section data-markdown><script type="text/template">
### Metacognitive Frames
- Rhetorical Situations as a way to understand the positioning of texts<sup>10, 11</sup>
	- Exigence: a problem or gap in knowledge to be addressed
	- Audience: body of individuals who can take action to address the exigence
	- Constraints: the affordances and limitations inherent to media and genres
	<br><br>
- Recursive writing processes involving ongoing revision<sup>12</sup>
<br><br>
- Primary and Secondary Literacies as lenses into discourse<sup>13</sup>
<br><br>
- Reflection and Metacognition as overt frames to encourage transfer<sup>14, 15</sup>
	- Reflection-in-Action: ongoing reflection during a task
	- Constructive Reflection: connection of literacies to self-identity
	- Reflection-in-Presentation: synthesis of prior experiences to take forward
</script></section><section data-markdown><script type="text/template">
### Analysis of New Media
- Low-stakes exploration of a new media platform
	- Facebook
	- Twitter
	- Instagram
	- TikTok
	- Tumblr
- How is science presented on the chosen platform?<sup>9</sup>
- What are the rhetorical "moves" being made?
- What are the benefits and detriments of the platform for effective communication?<sup>16</sup>
</script></section><section data-markdown><script type="text/template">
### The Podcast
- Students work collaboratively in teams,
- Synthesize research findings into a proposal for a podcast,
- Analyze affordances and limitations of podcasts,
- Create a rough script based upon findings,
- Record, edit, and remix an aural podcast draft, 
- Revise the podcast based on peer and instructor feedback, and
- Submit the podcast as part of an accompanying website
</script></section><section data-markdown><script type="text/template">

## Writing in the Disciplines
- Analyze the functional, critical, and rhetorical literacies employed in digital writing tools<sup>4</sup>
- Better understand the genres of scientific communication
- Provide a metacognitive scaffolding including terminology
- Share specialized knowledge with a broader public audience
</script></section><section data-markdown><script type="text/template">
### Selber's Multiliteracies
<style>
	h5 {
	margin-bottom: 0px !important;
	}
</style>
*Literacy* | *Description*
--- | ---
Functional | Can negotiate a tool and its interface
Critical | Understand affordances and limitations
Rhetorical | Use constraints to create effective texts
</script></section><section data-markdown><script type="text/template">
### Rearticulation, Not Transmission
- Writing as a metacognitive overlay coupled with content expertise<sup>17</sup>
- Information is altered whenever it is rearticulated<sup>18</sup>
- Ethical communicators need to understand use of metaphor and analogy, but also how to simplify without erasing nuance<sup>16</sup>
</script></section></section><section ><section data-markdown><script type="text/template">
## Key Pedagogical Principles
- Writing is a messy, recursive, exploratory process<sup>19</sup>
- Texts accomplish actions in the world
- Deliberate Practice is a key component of learning<sup>20, 21</sup>
- Metacognitive elements highlight low-road and high-road transfer<sup>22, 23</sup>
	- Provides a scaffold for future learning
	- Enhances pedagogical memories
- Engaging with messy problems requires Knowledge-Exploring dispositions rather than Answer-Getting dispositions<sup>24</sup>
</script></section><section data-markdown><script type="text/template">

      function extend() {
        var target = {};
        for (var i = 0; i < arguments.length; i++) {
          var source = arguments[i];
          for (var key in source) {
            if (source.hasOwnProperty(key)) {
              target[key] = source[key];
            }
          }
        }
        return target;
      }

	  function isLight(color) {
		let hex = color.replace('#', '');

		// convert #fff => #ffffff
		if(hex.length == 3){
			hex = `${hex[0]}${hex[0]}${hex[1]}${hex[1]}${hex[2]}${hex[2]}`;
		}

		const c_r = parseInt(hex.substr(0, 2), 16);
		const c_g = parseInt(hex.substr(2, 2), 16);
		const c_b = parseInt(hex.substr(4, 2), 16);
		const brightness = ((c_r * 299) + (c_g * 587) + (c_b * 114)) / 1000;
		return brightness > 155;
	}

	var bgColor = getComputedStyle(document.documentElement).getPropertyValue('--r-background-color').trim();

	if(isLight(bgColor)){
		document.body.classList.add('has-light-background');
	} else {
		document.body.classList.add('has-dark-background');
	}
